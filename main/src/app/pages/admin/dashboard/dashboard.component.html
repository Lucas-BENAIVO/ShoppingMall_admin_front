<div class="dashboard-container">
  <app-sidebar [isOpen]="sidebarOpen" (closeSidebar)="closeSidebar()"></app-sidebar>
  
  <div class="main-content">
    <app-boutique-navbar (menuToggle)="toggleSidebar()"></app-boutique-navbar>
    <div class="content-wrapper">
      <!-- En-tête Dashboard supprimé -->

      <!-- Stats Cards Grid -->
      <div class="stats-grid">
        <app-stat-card 
          *ngFor="let stat of stats"
          [icon]="stat.icon"
          [iconColor]="stat.iconColor"
          [label]="stat.label"
          [value]="stat.value"
          [change]="stat.change"
          [changeType]="stat.changeType"
          [changeIcon]="stat.changeIcon"
          [actionLabel]="stat.actionLabel"
          [actionColor]="stat.actionColor">
        </app-stat-card>
      </div>

      <!-- Dashboard cards sous les stats -->
      <div class="dashboard-stats-graphs statistiques-page">
        <div class="statistiques-graphiques">
          <div class="graphiques-row">
            <div class="graphe-container"><app-top-shops></app-top-shops></div>
            <div class="graphe-container"><app-category-distribution></app-category-distribution></div>
          </div>
          <div class="graphiques-row">
            <div class="graphe-container graphe-seul"><app-recent-users></app-recent-users></div>
          </div>
        </div>
      </div>
    </div>
    
    <app-footer></app-footer>
  </div>
</div>
