<div class="auth-container">
  <!-- Left Panel - Testimonial -->
  <div class="auth-right" style="background-image: url('/assets/images/backgrounds/free.jpg'); background-size: cover; background-position: center 70%; background-repeat: no-repeat; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
    <div class="testimonial-content">
      <div class="testimonial-stars">★★★★★</div>
      
      <p class="testimonial-quote">
        "Rejoignez des milliers de clients satisfaits qui font leurs achats en toute confiance."
      </p>
      
      <div class="testimonial-author">Sophie Martin</div>
      <div class="testimonial-position">Cliente Premium, ShoppingMall</div>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-left">
    <div class="auth-title">Créer un compte</div>
    <div class="auth-subtitle">Commencez votre aventure shopping dès maintenant.</div>

    <form>
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input type="text" class="form-input" placeholder="Entrez votre nom" />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Entrez votre email" />
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn-signup">S'inscrire</button>


      <div class="signin-link">
        Vous avez déjà un compte ?<a [routerLink]="['/authentication/login']">Connectez-vous</a>
      </div>
    </form>
  </div>
</div>
