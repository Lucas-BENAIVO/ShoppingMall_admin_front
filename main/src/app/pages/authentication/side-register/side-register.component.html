<div class="auth-container">
  <!-- Left Panel - Testimonial -->
  <div class="auth-right" style="background-image: url('/assets/images/backgrounds/free.jpg'); background-size: cover; background-position: center 70%; background-repeat: no-repeat; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
    <div class="testimonial-content">
      <div class="testimonial-stars">★★★★★</div>
      
      <p class="testimonial-quote">
        "Rejoignez des milliers de clients satisfaits qui font leurs achats en toute confiance."
      </p>
      
      <div class="testimonial-author">Sophie Martin</div>
      <div class="testimonial-position">Cliente Premium, ShoppingMall</div>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-left">
    <div class="auth-title">Créer un compte</div>
    <div class="auth-subtitle">Commencez votre aventure shopping dès maintenant.</div>

    <form>
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input type="text" class="form-input" placeholder="Entrez votre nom" />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Entrez votre email" />
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn-signup">S'inscrire</button>

      <button type="button" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.9895 10.1871C19.9895 9.36767 19.9214 8.76973 19.7742 8.14966H10.1992V11.848H15.8195C15.7062 12.7671 15.0943 14.1512 13.7346 15.0813L13.7155 15.2051L16.7429 17.4969L16.9527 17.5174C18.879 15.7789 19.9895 13.221 19.9895 10.1871Z" fill="#4285F4"/>
          <path d="M10.1993 19.9313C12.9527 19.9313 15.2643 19.0454 16.9527 17.5174L13.7346 15.0813C12.8734 15.6682 11.7176 16.0779 10.1993 16.0779C7.50243 16.0779 5.21352 14.3395 4.39759 11.9366L4.27799 11.9465L1.13003 14.3273L1.08887 14.4391C2.76588 17.6945 6.21061 19.9313 10.1993 19.9313Z" fill="#34A853"/>
          <path d="M4.39748 11.9366C4.18219 11.3166 4.05759 10.6521 4.05759 9.96565C4.05759 9.27909 4.18219 8.61473 4.38615 7.99466L4.38045 7.8626L1.19304 5.44366L1.08875 5.49214C0.397576 6.84305 0 8.36008 0 9.96565C0 11.5712 0.397576 13.0882 1.08875 14.4391L4.39748 11.9366Z" fill="#FBBC05"/>
          <path d="M10.1993 3.85336C12.1142 3.85336 13.406 4.66168 14.1425 5.33717L17.0207 2.59107C15.253 0.985496 12.9527 0 10.1993 0C6.2106 0 2.76588 2.23672 1.08887 5.49214L4.38626 7.99466C5.21352 5.59183 7.50242 3.85336 10.1993 3.85336Z" fill="#EB4335"/>
        </svg>
        S'inscrire avec Google
      </button>

      <div class="signin-link">
        Vous avez déjà un compte ?<a [routerLink]="['/authentication/login']">Connectez-vous</a>
      </div>
    </form>
  </div>
</div>
