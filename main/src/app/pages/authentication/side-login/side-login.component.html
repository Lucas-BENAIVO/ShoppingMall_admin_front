<div class="auth-container">
  <!-- Left Panel - Testimonial -->
  <div class="auth-right" style="background-image: url('/assets/images/backgrounds/free.jpg'); background-size: cover; background-position: center 70%; background-repeat: no-repeat; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
    <div class="testimonial-content">
      <div class="testimonial-stars">★★★★★</div>
      
      <p class="testimonial-quote">
        "Nous adorons utiliser cette plateforme ! L'expérience d'achat est simple et agréable."
      </p>
      
      <div class="testimonial-author">Marie Dubois</div>
      <div class="testimonial-position">Fondatrice, StyleHub, Agence de Mode en ligne</div>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-left">
    <div class="auth-title">Administration</div>
    <div class="auth-subtitle">Connectez-vous à votre espace administrateur.</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Entrez votre email" formControlName="email" />
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" placeholder="••••••••" formControlName="password" />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div class="form-options">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="remember" />
          <label for="remember">Se souvenir pendant 30 jours</label>
        </div>
      </div>

      <button type="submit" class="btn-signin" [disabled]="isLoading">
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Connexion en cours...</span>
      </button>
    </form>
  </div>
</div>
