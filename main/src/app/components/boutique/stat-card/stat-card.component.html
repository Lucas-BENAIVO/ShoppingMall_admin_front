<div class="stat-card">
  <div class="card-header">
    <div class="icon-container" [style.color]="iconColor">
      <mat-icon>{{ icon }}</mat-icon>
    </div>
    <div class="action-badge" *ngIf="actionLabel" [style.backgroundColor]="actionColor">
      {{ actionLabel }}
    </div>
  </div>
  
  <div class="card-content">
    <p class="card-label">{{ label }}</p>
    <p class="card-value">{{ value }}</p>
    <p class="card-change" [class.positive]="changeType === 'positive'" 
       [class.negative]="changeType === 'negative'"
       *ngIf="change">
      <mat-icon class="change-icon">{{ changeIcon }}</mat-icon>
      <span>{{ change }}</span>
    </p>
  </div>
</div>
