<!-- Ancienne table supprimée pour éviter les balises imbriquées et erreurs de fermeture -->
<div class="promotions-list-container">
  <div class="promotions-list-header">
    <h2>Gestion des emplacements</h2>
    <div class="promotions-list-actions">
      <button class="add-btn" (click)="openAddForm()">Ajouter un emplacement</button>
      <select class="filter-select">
        <option value="">Toutes les zones</option>
        <option value="A">Zone A</option>
        <option value="B">Zone B</option>
        <option value="C">Zone C</option>
      </select>
    </div>
  </div>

  <table class="promotions-table">
    <thead>
      <tr>
        <th>Boutique</th>
        <th>Position</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of emplacements">
        <td>{{ e.boutique }}</td>
        <td>{{ e.position }}</td>
        <td>{{ e.description }}</td>
        <td>
          <button class="edit-btn" (click)="openEditForm(e)">
            <span class="iconify" data-icon="solar:server-square-update-line-duotone" style="font-size: 1.15em;"></span>
          </button>
          <button class="delete-btn" (click)="deleteEmplacement(e.id!)">
            <span class="iconify" data-icon="solar:trash-bin-trash-line-duotone" style="font-size: 1.3em;"></span>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="promotions-pagination">
    <button class="pagination-btn">Précédent</button>
    <button class="pagination-btn active">1</button>
    <button class="pagination-btn">2</button>
    <button class="pagination-btn">3</button>
    <button class="pagination-btn">Suivant</button>
  </div>

  <div *ngIf="showForm" class="modal-overlay">
    <div class="modal-content">
      <app-emplacement-form
        [emplacement]="editEmplacement"
        (save)="onSaveEmplacement($event)"
        (cancel)="closeForm()">
      </app-emplacement-form>
    </div>
    <div class="modal-backdrop" (click)="closeForm()"></div>
  </div>
</div>
