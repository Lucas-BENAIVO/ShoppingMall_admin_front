<div class="promotions-list-container">
  <div class="promotions-list-header">
    <h2>Gestion des promotions</h2>
    <div class="promotions-list-actions">
      <button class="add-btn" (click)="openAddForm()">Ajouter une promotion</button>
      <select class="filter-select" [(ngModel)]="selectedType">
        <option value="">Tous types</option>
        <option value="Code promo">Code promo</option>
        <option value="Carte fidélité">Carte de fidélité</option>
        <option value="Promotion globale">Promotion globale (ex: Black Friday, Soldes)</option>
      </select>
    </div>
  </div>

  <table class="promotions-table">
    <thead>
      <tr>
        <th>Type</th>
        <th>Nom</th>
        <th>Valeur</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let promo of filteredPromotions">
        <td>
          <div class="promo-info">
            <div class="promo-avatar">
              <span class="iconify" 
                [attr.data-icon]="promo.type === 'Code promo' ? 'solar:tag-price-bold-duotone' : 'solar:card-bold-duotone'"
                style="font-size: 1.4em;">
              </span>
            </div>
            <div>
              <div class="promo-nom">{{ promo.nom }}</div>
              <div class="promo-type">{{ promo.type }}</div>
            </div>
          </div>
        </td>
        <td>{{ promo.nom }}</td>
        <td><b>{{ promo.valeur }}</b></td>
        <td>
          <span class="status" [ngClass]="{
            'actif': promo.statut === 'Actif',
            'inactif': promo.statut === 'Inactif',
            'expire': promo.statut === 'Expiré'
          }">{{ promo.statut }}</span>
        </td>
        <td>
          <button class="edit-btn" (click)="openEditForm(promo)">
          <span class="iconify" data-icon="solar:server-square-update-line-duotone" style="font-size: 1.15em;"></span>
          </button>
          <button class="delete-btn" (click)="deletePromotion(promo.id)">
            <span class="iconify" data-icon="solar:trash-bin-trash-line-duotone" style="font-size: 1.3em;"></span>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="promotions-pagination">
    <button class="pagination-btn">Previous</button>
    <button class="pagination-btn active">1</button>
    <button class="pagination-btn">2</button>
    <button class="pagination-btn">3</button>
    <button class="pagination-btn">Next</button>
  </div>

  <div *ngIf="showForm" class="modal-overlay">
    <div class="modal-content">
      <app-promotions-form
        [promotion]="editPromotion"
        (save)="onSavePromotion($event)"
        (cancel)="closeForm()">
      </app-promotions-form>
    </div>
    <div class="modal-backdrop" (click)="closeForm()"></div>
  </div>
</div>
