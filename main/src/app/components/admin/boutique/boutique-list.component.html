    <div class="boutique-list-header">
    <div class="filters">
        <input type="text" placeholder="Rechercher une boutique, une catégorie ou une localisation..." />
        <select>
        <option>Toutes les catégories</option>
        </select>
        <select>
        <option>Toutes les notes</option>
        </select>
        <select>
        <option>Trier : En vedette</option>
        </select>
        <button class="filter-btn">Filtrer</button>
    </div>
    <div class="results-count"><span class="count-strong">{{ boutiques.length }} boutiques</span> référencées</div>
    </div>
    <div class="boutique-grid">
    <div class="boutique-card" *ngFor="let boutique of boutiques">
        <div class="card-image">
        <img [src]="boutique.image" [alt]="boutique.nom" />
        <div class="badges">
            <span *ngFor="let badge of boutique.badges" class="badge" [ngClass]="badge.toLowerCase()">{{ badge }}</span>
        </div>
        </div>
        <div class="card-content">
        <div class="card-title">{{ boutique.nom }}</div>
        <div class="card-category">{{ boutique.categorie }}</div>
        <div class="card-rating">
            <span class="star">★</span> {{ boutique.note }}
            <span class="reviews">({{ boutique.avis }} reviews)</span>
        </div>
        <div class="location-status-row">
            <span class="card-location">{{ boutique.etage }}</span>
            <span *ngIf="boutique.statut === 'Ouvert'" class="status-badge ouvert">
            <span class="dot"></span> Ouvert
            </span>
            <span *ngIf="boutique.statut !== 'Ouvert'" class="status-badge ferme">
            <span class="dot"></span> Fermé
            </span>
        </div>
        <div class="boutique-actions">
            <button class="view-btn">Voir la boutique</button>
            <button class="icon-btn edit-btn" title="Modifier">
            <span class="iconify" data-icon="solar:server-square-update-line-duotone" style="font-size: 1.15em;"></span>
            </button>
            <button class="icon-btn delete-btn" title="Supprimer">
            <span class="iconify" data-icon="solar:trash-bin-trash-line-duotone" style="font-size: 1.15em;"></span>
            </button>
        </div>
        </div>
    </div>
    </div>
