<mat-toolbar class="topbar gap-2">


  <!-- Mobile Menu -->
  @if(!showToggle) {
  <button mat-icon-button (click)="toggleMobileNav.emit()" class="flex justify-center">
    <i class="iconify flex" data-icon="solar:hamburger-menu-linear"></i>
  </button>
  }

  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Notifications">
    <i data-icon="solar:bell-bing-linear" class="iconify size-5.5!"></i>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item>Item 1</button>
    <button mat-menu-item>Item 2</button>
  </mat-menu>
  <!-- --------------------------------------------------------------- -->


  <span class="flex-auto"></span>


  <a mat-flat-button href="https://adminmart.com/product/modernize-angular-admin-dashboard/?ref=56#product-demo-section"
    target="_blank" class="d-flex justify-content-center bg-success">
    Check Pro Template
  </a>

  <!-- --------------------------------------------------------------- -->
  <!-- profile Dropdown -->
  <!-- --------------------------------------------------------------- -->
  <div class="flex items-center gap-2">
    <span class="text-sm font-medium" *ngIf="currentUser">{{ currentUser.fullName }}</span>
    <button mat-icon-button extended [matMenuTriggerFor]="profilemenu" aria-label="Notifications"
      class="flex! items-center justify-center profile-btn-dd">
      <img src="/assets/images/profile/user-1.jpg" class="rounded-full object-cover size-9! profile-dd" width="35" />
    </button>
  </div>
  <mat-menu #profilemenu="matMenu" class="cardWithShadow">
    <div class="px-3 py-2 border-b" *ngIf="currentUser">
      <p class="font-medium m-0">{{ currentUser.fullName }}</p>
      <p class="text-xs text-gray-500 m-0">{{ currentUser.email }}</p>
    </div>
    <button mat-menu-item>
      <mat-icon class="flex items-center"><i data-icon="solar:shield-user-line-duotone"
          class="iconify size-5.5!"></i></mat-icon>Mon Profil
    </button>
    <button mat-menu-item>
      <mat-icon class="flex items-center"><i data-icon="solar:user-id-line-duotone"
          class="iconify size-5.5!"></i></mat-icon>Mon Compte
    </button>
    <button mat-menu-item>
      <mat-icon class="flex items-center"><i data-icon="solar:checklist-minimalistic-line-duotone"
          class="iconify size-5.5!"></i> </mat-icon>Mes Tâches
    </button>

    <div class="px-3 mt-3">
      <button mat-stroked-button class="w-full" (click)="logout()">Déconnexion</button>
    </div>
  </mat-menu>
</mat-toolbar>
